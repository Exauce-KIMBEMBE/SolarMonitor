<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manager - SolarMonitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="headerTop">
    <h1>Manager SolarMonitor</h1>
    <button class="pill off-btn" id="logoutBtn">Déconnexion</button>
  </div>
</header>

<main>
  <section class="card full-width">
    <h2>Utilisateurs en attente</h2>
    <div id="usersList"></div>
  </section>
</main>

<script>
const API_URL = "https://solarmonitor.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

async function loadUsers() {
  const res = await fetch(`${API_URL}/api/admin/users?status=pending`, {
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  const users = await res.json();
  usersList.innerHTML = "";

  if (!Array.isArray(users) || users.length === 0) {
    usersList.innerHTML = "<p>Aucune demande en attente.</p>";
    return;
  }

  users.forEach(user => {
    const div = document.createElement("div");
    div.className = "card";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <h3>${user.firstname} ${user.lastname}</h3>
      <p>Email : ${user.email}</p>
      <p>Statut : ${user.status}</p>

      <button class="pill on-btn" onclick="updateStatus(${user.id}, 'approved')">
        Valider
      </button>

      <button class="pill off-btn" onclick="updateStatus(${user.id}, 'rejected')">
        Refuser
      </button>
    `;

    usersList.appendChild(div);
  });
}

async function updateStatus(id, status) {
  const res = await fetch(`${API_URL}/api/admin/users/${id}/status`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({ status })
  });

  if (res.ok) {
    loadUsers();
  } else {
    alert("Erreur lors de la mise à jour");
  }
}

logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "login.html";
});

loadUsers();
</script>

</body>
</html>
