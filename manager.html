<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manager - SolarMonitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="headerTop">
    <h1>Manager SolarMonitor</h1>

    <div class="row">
      <a class="pill info" href="index.html">Accueil</a>
      <button class="pill off-btn" id="logoutBtn">Déconnexion</button>
    </div>
  </div>
</header>

<main>
  <section class="card full-width">
    <h2>Utilisateurs en attente</h2>
    <p id="message" class="muted">Chargement...</p>
    <div id="usersList"></div>
  </section>
</main>

<script>
const API_URL = "https://solarmonitor-5093.onrender.com";

const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "null");

const usersList = document.getElementById("usersList");
const message = document.getElementById("message");
const logoutBtn = document.getElementById("logoutBtn");

if (!token || !user) {
  window.location.href = "login.html";
}

if (user && user.role !== "admin" && user.role !== "manager") {
  alert("Accès réservé au manager.");
  window.location.href = "index.html";
}

async function loadUsers() {
  message.style.color = "#9fb1ff";
  message.textContent = "Chargement des demandes...";
  usersList.innerHTML = "";

  try {
    const res = await fetch(`${API_URL}/api/admin/users?status=pending`, {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const result = await res.json();

    if (!res.ok) {
      message.style.color = "#e74c3c";
      message.textContent = result.error || "Erreur lors du chargement.";
      return;
    }

    if (!Array.isArray(result) || result.length === 0) {
      message.style.color = "#9fb1ff";
      message.textContent = "Aucune demande en attente.";
      return;
    }

    message.textContent = "";

    result.forEach(user => {
      const div = document.createElement("div");
      div.className = "card";
      div.style.marginBottom = "12px";

      div.innerHTML = `
        <h3>${user.firstname || ""} ${user.lastname || ""}</h3>
        <p>Email : <b>${user.email}</b></p>
        <p>Statut : <b>${user.status}</b></p>
        <p>Date : ${user.created_at || "—"}</p>

        <div class="row">
          <button class="pill on-btn" data-action="approved">
            Valider
          </button>

          <button class="pill off-btn" data-action="rejected">
            Refuser
          </button>
        </div>
      `;

      div.querySelector('[data-action="approved"]').addEventListener("click", () => {
        updateStatus(user.id, "approved");
      });

      div.querySelector('[data-action="rejected"]').addEventListener("click", () => {
        updateStatus(user.id, "rejected");
      });

      usersList.appendChild(div);
    });

  } catch (err) {
    console.error(err);

    message.style.color = "#e74c3c";
    message.textContent = "Serveur inaccessible.";
  }
}

async function updateStatus(id, status) {
  try {
    const res = await fetch(`${API_URL}/api/admin/users/${id}/status`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ status })
    });

    const result = await res.json();

    if (res.ok) {
      message.style.color = "#1cc88a";
      message.textContent = status === "approved"
        ? "Utilisateur validé."
        : "Utilisateur refusé.";

      loadUsers();
    } else {
      alert(result.error || "Erreur lors de la mise à jour.");
    }

  } catch (err) {
    console.error(err);
    alert("Serveur inaccessible.");
  }
}

logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "login.html";
});

loadUsers();
</script>

</body>
</html>
