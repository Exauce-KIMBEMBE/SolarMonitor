<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manager - SolarMonitor</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="headerTop">

<h1>Manager SolarMonitor</h1>

<div class="row">

<a class="pill info" href="index.html">
Accueil
</a>

<button class="pill off-btn" id="logoutBtn">
Déconnexion
</button>

</div>

</div>
</header>


<main>

<section class="card full-width">

<h2>Gestion utilisateurs</h2>

<p id="message" class="muted">
Chargement...
</p>

<div id="usersList"></div>

</section>

</main>


<script>

const API_URL=
"https://solarmonitor-5093.onrender.com";

const token=
localStorage.getItem("token");

const currentUser=
JSON.parse(
localStorage.getItem("user")||"null"
);

const usersList=
document.getElementById("usersList");

const message=
document.getElementById("message");

const logoutBtn=
document.getElementById("logoutBtn");


if(!token||!currentUser){

window.location.href=
"login.html";

}


if(
currentUser.role!=="admin"
&&
currentUser.role!=="manager"
){

alert(
"Accès réservé au manager"
);

window.location.href=
"index.html";

}


/* utilisateurs masqués */

const hiddenIds=[1,3,5,10];



async function loadUsers(){

message.style.color=
"#9fb1ff";

message.textContent=
"Chargement utilisateurs...";

usersList.innerHTML="";


try{

const res=
await fetch(

`${API_URL}/api/admin/users`,

{
headers:{
Authorization:
`Bearer ${token}`
}
}

);


const users=
await res.json();


if(!res.ok){

message.style.color=
"#e74c3c";

message.textContent=

users.error||
"Erreur chargement";

return;

}


const visibleUsers=
users.filter(
u=>!hiddenIds.includes(
Number(u.id)
)
);


if(
visibleUsers.length===0
){

message.textContent=
"Aucun utilisateur";

return;

}


message.textContent="";


visibleUsers.forEach(user=>{

const div=
document.createElement("div");

div.className=
"card";

div.style.marginBottom=
"12px";


let color="#9fb1ff";

if(user.status==="approved")
color="#1cc88a";

if(user.status==="rejected")
color="#e74c3c";

if(user.status==="pending")
color="#f1c40f";


div.innerHTML=`

<h3>
${user.firstname||""}
${user.lastname||""}
</h3>

<p>
Email :
<b>${user.email}</b>
</p>

<p>
ID :
<b>${user.id}</b>
</p>

<p>
Rôle :
<b>${user.role}</b>
</p>

<p>
Statut :
<b style="color:${color}">
${user.status}
</b>
</p>

<p>
Date :
${user.created_at||"—"}
</p>


<div class="row">

<button
class="pill on-btn"
data-status="approved">

Valider

</button>


<button
class="pill info"
data-status="pending">

Attente

</button>


<button
class="pill off-btn"
data-status="rejected">

Refuser

</button>


<button
class="pill info"
data-role="admin">

Mettre Admin

</button>


<button
class="pill info"
data-role="user">

Mettre User

</button>


<button
class="pill off-btn"
data-delete="true">

Supprimer

</button>


</div>

`;


div
.querySelectorAll(
"[data-status]"
)
.forEach(btn=>{

btn.addEventListener(
"click",
()=>{

updateStatus(
user.id,
btn.dataset.status
);

}

);

});



div
.querySelectorAll(
"[data-role]"
)
.forEach(btn=>{

btn.addEventListener(
"click",
()=>{

updateRole(
user.id,
btn.dataset.role
);

}

);

});



div
.querySelector(
"[data-delete]"
)
.addEventListener(
"click",
()=>{

deleteUser(
user.id,
user.email
);

}
);


usersList
.appendChild(div);

});

}
catch(err){

console.log(err);

message.style.color=
"#e74c3c";

message.textContent=
"Serveur inaccessible";

}

}



async function updateStatus(
id,
status
){

try{

const res=
await fetch(

`${API_URL}/api/admin/users/${id}/status`,

{

method:"PATCH",

headers:{

"Content-Type":
"application/json",

Authorization:
`Bearer ${token}`

},

body:
JSON.stringify({
status
})

}

);

const result=
await res.json();


if(res.ok){

message.style.color=
"#1cc88a";

message.textContent=
"Statut modifié";

loadUsers();

}
else{

alert(
result.error
||
"Erreur"
);

}

}
catch{

alert(
"Serveur inaccessible"
);

}

}



async function updateRole(
id,
role
){

try{

const res=
await fetch(

`${API_URL}/api/admin/users/${id}/role`,

{

method:"PATCH",

headers:{

"Content-Type":
"application/json",

Authorization:
`Bearer ${token}`

},

body:
JSON.stringify({
role
})

}

);

const result=
await res.json();


if(res.ok){

message.style.color=
"#1cc88a";

message.textContent=
"Rôle modifié";

loadUsers();

}
else{

alert(
result.error
||
"Erreur rôle"
);

}

}
catch{

alert(
"Serveur inaccessible"
);

}

}



async function deleteUser(
id,
email
){

if(
!confirm(
`Supprimer ${email} ?`
)
){
return;
}


try{

const res=
await fetch(

`${API_URL}/api/admin/users/${id}`,

{

method:"DELETE",

headers:{
Authorization:
`Bearer ${token}`
}

}

);


const result=
await res.json();


if(res.ok){

message.style.color=
"#1cc88a";

message.textContent=
"Utilisateur supprimé";

loadUsers();

}
else{

alert(
result.error
||
"Erreur suppression"
);

}

}
catch{

alert(
"Serveur inaccessible"
);

}

}



logoutBtn.addEventListener(
"click",
()=>{

localStorage.removeItem(
"token"
);

localStorage.removeItem(
"user"
);

window.location.href=
"login.html";

}
);


loadUsers();

</script>

</body>
</html>
