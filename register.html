<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription - SolarMonitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="auth-page">
  <section class="card auth-card">
    <h1>Créer un compte</h1>
    <p class="muted">Votre compte devra être validé par le manager.</p>

    <form id="registerForm">
      <input id="firstname" type="text" placeholder="Prénom" required>
      <input id="lastname" type="text" placeholder="Nom" required>
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Mot de passe" required>

      <button class="pill on-btn" type="submit">S'inscrire</button>
    </form>

    <p id="message"></p>
    <a href="login.html">Déjà un compte ? Connexion</a>
  </section>
</main>

<script>

const API_URL="https://solarmonitor-5093.onrender.com";

const form=
document.getElementById("registerForm");

const message=
document.getElementById("message");

const firstnameInput=
document.getElementById("firstname");

const lastnameInput=
document.getElementById("lastname");

const emailInput=
document.getElementById("email");

const passwordInput=
document.getElementById("password");


form.addEventListener(
"submit",

async(e)=>{

e.preventDefault();

message.style.color="#9fb1ff";
message.textContent=
"Envoi en cours...";


const data={

firstname:
firstnameInput.value.trim(),

lastname:
lastnameInput.value.trim(),

email:
emailInput.value.trim(),

password:
passwordInput.value

};


try{

const res=
await fetch(

`${API_URL}/api/register`,

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:
JSON.stringify(data)

}

);


const result=
await res.json();


if(res.ok){

message.style.color=
"#1cc88a";

message.textContent=

result.message ||
"Inscription envoyée";

form.reset();

}
else{

message.style.color=
"#e74c3c";

message.textContent=

result.error ||
"Erreur inscription";

}

}
catch(err){

console.log(err);

message.style.color=
"#e74c3c";

message.textContent=
"Serveur inaccessible";

}

}

);

</script>

</body>
</html>
