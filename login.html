<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion - SolarMonitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="auth-page">
  <section class="card auth-card">

    <h1>Connexion</h1>

    <p class="muted">
      Connectez-vous pour accéder aux données.
    </p>

    <form id="loginForm">
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Mot de passe" required>

      <button class="pill on-btn" type="submit" id="loginBtn">
        Se connecter
      </button>
    </form>

    <p id="message" style="font-weight:bold;"></p>

    <p>
      Pas encore de compte ?
      <a href="register.html">Créer un compte</a>
    </p>

    <p>
      <a href="index.html">Retour à l’accueil</a>
    </p>

  </section>
</main>

<script>
const API_URL = "https://solarmonitor-5093.onrender.com";

const form = document.getElementById("loginForm");
const message = document.getElementById("message");
const btn = document.getElementById("loginBtn");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  message.style.color = "#9fb1ff";
  message.textContent = "Connexion en cours...";
  btn.disabled = true;

  const data = {
    email: emailInput.value.trim(),
    password: passwordInput.value
  };

  try {
    const res = await fetch(`${API_URL}/api/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
      localStorage.setItem("token", result.token);
      localStorage.setItem("user", JSON.stringify(result.user));

      message.style.color = "#1cc88a";
      message.textContent = "Connexion réussie.";

      setTimeout(() => {
        if (result.user.role === "admin" || result.user.role === "manager") {
          window.location.href = "manager.html";
        } else {
          window.location.href = "index.html";
        }
      }, 800);

    } else {
      message.style.color = "#e74c3c";
      message.textContent = result.error || "Erreur de connexion.";
    }

  } catch (err) {
    console.error(err);

    message.style.color = "#e74c3c";
    message.textContent = "Serveur inaccessible.";
  }

  btn.disabled = false;
});
</script>

</body>
</html>
